<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间胶囊 — Logo Design Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #F9F7F4;
            color: #1A1A1A;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }
        html { scroll-behavior: smooth; }
        .logo-card { transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .logo-card:hover { transform: translateY(-4px); }
        .logo-canvas { transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .logo-aura {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(161,122,58,0.12) 0%, transparent 70%);
            border-radius: 50%;
            transform: scale(0.5);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            filter: blur(40px);
            pointer-events: none;
        }
        .logo-card:hover .logo-aura { transform: scale(1.5); opacity: 1; }
        .divider-line {
            width: 0; height: 1px;
            background: #1A1A1A;
            opacity: 0.15;
            transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo-card:hover .divider-line { width: 80%; }
        .tracking-ultra-wide { letter-spacing: 0.2em; }
        .text-balance { text-wrap: balance; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        /* ─────────────────────────────────────────────────────────
         * VARIANT 1: Sealed Aperture
         * Pure geometric. A camera aperture abstracted into 6 arc
         * blades — the shutter frozen at the moment of capture.
         * Single focal point at center.
         * ───────────────────────────────────────────────────────── */
        const SealedAperture = () => (
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                 style={{ width: '100%', height: '100%', color: '#2b2015' }}>
                {/* 6 aperture blades as arcs */}
                <g stroke="currentColor" strokeWidth="3" strokeLinecap="round">
                    <path d="M 50 18 A 32 32 0 0 1 78 38"/>
                    <path d="M 78 38 A 32 32 0 0 1 72 70"/>
                    <path d="M 72 70 A 32 32 0 0 1 44 82"/>
                    <path d="M 44 82 A 32 32 0 0 1 17 62"/>
                    <path d="M 17 62 A 32 32 0 0 1 23 30"/>
                    <path d="M 23 30 A 32 32 0 0 1 50 18"/>
                </g>
                {/* Blade gaps — negative space cuts */}
                <g stroke="#F9F7F4" strokeWidth="2.5" strokeLinecap="round">
                    <line x1="50" y1="18" x2="55" y2="32"/>
                    <line x1="78" y1="38" x2="65" y2="45"/>
                    <line x1="72" y1="70" x2="59" y2="62"/>
                    <line x1="44" y1="82" x2="44" y2="67"/>
                    <line x1="17" y1="62" x2="31" y2="57"/>
                    <line x1="23" y1="30" x2="36" y2="39"/>
                </g>
                {/* Center pupil */}
                <circle cx="50" cy="50" r="5.5" fill="currentColor"/>
                {/* Inner ring — the frozen moment */}
                <circle cx="50" cy="50" r="14" stroke="currentColor" strokeWidth="1.5" opacity="0.3"/>
            </svg>
        );

        /* ─────────────────────────────────────────────────────────
         * VARIANT 2: Capsule Text
         * Letter-geometry hybrid. A pill capsule (time capsule)
         * with three horizontal lines inside — the caption waiting
         * to be born. Capsule = container; lines = language.
         * ───────────────────────────────────────────────────────── */
        const CapsuleText = () => (
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                 style={{ width: '100%', height: '100%', color: '#2b2015' }}>
                <defs>
                    <clipPath id="pill-clip">
                        <rect x="28" y="22" width="44" height="56" rx="22"/>
                    </clipPath>
                </defs>
                {/* Capsule outline */}
                <rect x="28" y="22" width="44" height="56" rx="22"
                      stroke="currentColor" strokeWidth="3"/>
                {/* Mid equator divider */}
                <line x1="28" y1="50" x2="72" y2="50"
                      stroke="currentColor" strokeWidth="2" opacity="0.35"/>
                {/* Text lines in lower half — clipped */}
                <g clip-path="url(#pill-clip)" stroke="currentColor" strokeLinecap="round">
                    <line x1="38" y1="60" x2="62" y2="60" strokeWidth="2.5"/>
                    <line x1="38" y1="68" x2="56" y2="68" strokeWidth="2"/>
                </g>
                {/* Upper half — the photo/moment: single dot */}
                <circle cx="50" cy="36" r="5" fill="currentColor"/>
            </svg>
        );

        /* ─────────────────────────────────────────────────────────
         * VARIANT 3: Asymmetric Orbit
         * Node network. A photo node (large) orbited by three
         * caption satellites at uneven distances — asymmetry
         * signals the unpredictability of poetic language.
         * Thin curved paths suggest gravitational pull.
         * ───────────────────────────────────────────────────────── */
        const AsymmetricOrbit = () => (
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                 style={{ width: '100%', height: '100%', color: '#2b2015' }}>
                {/* Orbital paths */}
                <ellipse cx="50" cy="50" rx="30" ry="20"
                         stroke="currentColor" strokeWidth="1" opacity="0.2"
                         transform="rotate(-25 50 50)"/>
                <ellipse cx="50" cy="50" rx="22" ry="32"
                         stroke="currentColor" strokeWidth="1" opacity="0.15"
                         transform="rotate(15 50 50)"/>
                {/* Connection lines */}
                <g stroke="currentColor" strokeWidth="1.5" opacity="0.45" strokeLinecap="round">
                    <path d="M 50 50 Q 62 42, 72 30"/>
                    <path d="M 50 50 Q 38 62, 28 72"/>
                    <path d="M 50 50 Q 68 56, 74 68"/>
                </g>
                {/* Satellite nodes */}
                <circle cx="72" cy="30" r="3.5" fill="currentColor"/>
                <circle cx="28" cy="72" r="3" fill="currentColor" opacity="0.7"/>
                <circle cx="74" cy="68" r="2.5" fill="currentColor" opacity="0.55"/>
                {/* Central body — the photo */}
                <circle cx="50" cy="50" r="8.5" fill="currentColor"/>
                <circle cx="50" cy="50" r="13" stroke="currentColor" strokeWidth="1.5" opacity="0.2"/>
            </svg>
        );

        /* ─────────────────────────────────────────────────────────
         * VARIANT 4: Pinhole Frame
         * Geometry + line system. A square photo frame with
         * corner pin marks (surveyor crosses) — the physical act
         * of mounting a photograph. Dense negative space inside.
         * References film photography's tactile precision.
         * ───────────────────────────────────────────────────────── */
        const PinholeFrame = () => (
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                 style={{ width: '100%', height: '100%', color: '#2b2015' }}>
                {/* Outer frame */}
                <rect x="20" y="20" width="60" height="60"
                      stroke="currentColor" strokeWidth="2.5"/>
                {/* Corner cross marks — pinhole registration */}
                <g stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                    {/* Top-left */}
                    <line x1="20" y1="12" x2="20" y2="20"/>
                    <line x1="12" y1="20" x2="20" y2="20"/>
                    {/* Top-right */}
                    <line x1="80" y1="12" x2="80" y2="20"/>
                    <line x1="80" y1="20" x2="88" y2="20"/>
                    {/* Bottom-right */}
                    <line x1="80" y1="80" x2="80" y2="88"/>
                    <line x1="80" y1="80" x2="88" y2="80"/>
                    {/* Bottom-left */}
                    <line x1="20" y1="80" x2="20" y2="88"/>
                    <line x1="12" y1="80" x2="20" y2="80"/>
                </g>
                {/* Center aperture — asymmetric */}
                <circle cx="50" cy="48" r="10" stroke="currentColor" strokeWidth="2.5"/>
                {/* Caption mark — three descending lines offset right */}
                <g stroke="currentColor" strokeLinecap="round">
                    <line x1="44" y1="66" x2="58" y2="66" strokeWidth="2"/>
                    <line x1="44" y1="72" x2="54" y2="72" strokeWidth="1.5"/>
                </g>
            </svg>
        );

        /* ─────────────────────────────────────────────────────────
         * VARIANT 5: Radial Breath
         * Dot matrix + radial burst. 12 rays from center,
         * alternating long/short, with dot caps — like a shutter
         * release button seen from above, or a clock without hands.
         * Dense center mass, sparse edge. Pure monochrome geometry.
         * ───────────────────────────────────────────────────────── */
        const RadialBreath = () => (
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                 style={{ width: '100%', height: '100%', color: '#2b2015' }}>
                {/* 12 radial rays — alternating lengths */}
                <g stroke="currentColor" strokeLinecap="round">
                    {/* Long rays at 0, 60, 120, 180, 240, 300 */}
                    <line x1="50" y1="50" x2="50" y2="18" strokeWidth="2.5"/>
                    <line x1="50" y1="50" x2="77.7" y2="66" strokeWidth="2.5"/>
                    <line x1="50" y1="50" x2="77.7" y2="34" strokeWidth="2.5"/>
                    <line x1="50" y1="50" x2="50" y2="82" strokeWidth="2.5"/>
                    <line x1="50" y1="50" x2="22.3" y2="66" strokeWidth="2.5"/>
                    <line x1="50" y1="50" x2="22.3" y2="34" strokeWidth="2.5"/>
                    {/* Short rays at 30, 90, 150, 210, 270, 330 */}
                    <line x1="50" y1="50" x2="64" y2="22.6" strokeWidth="1.5" opacity="0.45"/>
                    <line x1="50" y1="50" x2="82" y2="50" strokeWidth="1.5" opacity="0.45"/>
                    <line x1="50" y1="50" x2="64" y2="77.4" strokeWidth="1.5" opacity="0.45"/>
                    <line x1="50" y1="50" x2="36" y2="77.4" strokeWidth="1.5" opacity="0.45"/>
                    <line x1="50" y1="50" x2="18" y2="50" strokeWidth="1.5" opacity="0.45"/>
                    <line x1="50" y1="50" x2="36" y2="22.6" strokeWidth="1.5" opacity="0.45"/>
                </g>
                {/* Long ray end-dots */}
                <g fill="currentColor">
                    <circle cx="50" cy="18" r="3"/>
                    <circle cx="77.7" cy="66" r="3"/>
                    <circle cx="77.7" cy="34" r="3"/>
                    <circle cx="50" cy="82" r="3"/>
                    <circle cx="22.3" cy="66" r="3"/>
                    <circle cx="22.3" cy="34" r="3"/>
                </g>
                {/* Center */}
                <circle cx="50" cy="50" r="6" fill="currentColor"/>
            </svg>
        );

        /* ─────────────────────────────────────────────────────────
         * VARIANT 6: Folded Light
         * Layered composition. A square photo that bends at a
         * diagonal — one half solid frame, one half unfolds into
         * a text-line trail. Captures the transformation from
         * image to language: the photo literally "opens" into words.
         * ───────────────────────────────────────────────────────── */
        const FoldedLight = () => (
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                 style={{ width: '100%', height: '100%', color: '#2b2015' }}>
                {/* Upper-left photo half */}
                <path d="M 22 22 L 22 70 L 70 22 Z"
                      fill="currentColor" opacity="0.07"/>
                <path d="M 22 22 L 22 70 L 70 22 Z"
                      stroke="currentColor" strokeWidth="2.5" strokeLinejoin="round"/>
                {/* Photo detail — aperture inside triangle */}
                <circle cx="36" cy="36" r="5.5" stroke="currentColor" strokeWidth="2"/>
                <circle cx="36" cy="36" r="1.5" fill="currentColor"/>
                {/* Fold crease */}
                <line x1="22" y1="70" x2="70" y2="22"
                      stroke="currentColor" strokeWidth="1" strokeDasharray="3 3" opacity="0.4"/>
                {/* Lower-right language half — radiating text lines */}
                <g stroke="currentColor" strokeLinecap="round">
                    <line x1="54" y1="58" x2="78" y2="58" strokeWidth="2.5"/>
                    <line x1="54" y1="66" x2="74" y2="66" strokeWidth="2"/>
                    <line x1="54" y1="74" x2="68" y2="74" strokeWidth="1.5" opacity="0.6"/>
                </g>
                {/* Fold corner dot */}
                <circle cx="70" cy="78" r="3" fill="currentColor" opacity="0.4"/>
            </svg>
        );

        /* ─────────────────────────────────────────
         * SHOWCASE DATA
         * ───────────────────────────────────────── */
        const logos = [
            {
                Component: SealedAperture,
                title: "Sealed Aperture",
                subtitle: "SHUTTER · FROZEN MOMENT",
                philosophy: "六片光圈叶片在快门释放的瞬间凝固——这个标志将相机最核心的机械动作抽象为纯几何形态。中央瞳孔是时间停止的那一刻，周围的暗环是焦距收束的回响。极简纯净，无任何装饰性元素。"
            },
            {
                Component: CapsuleText,
                title: "Capsule Text",
                subtitle: "CONTAINER · LANGUAGE",
                philosophy: "胶囊形态直接呼应「时间胶囊」的产品名。上半部分是一张照片（圆形节点），下半部分是尚未被读出的文字（横线）。赤道分割线暗示了图像与语言之间的界面——AI 就在这条线上工作。"
            },
            {
                Component: AsymmetricOrbit,
                title: "Asymmetric Orbit",
                subtitle: "GRAVITY · CAPTIONS",
                philosophy: "中心是照片本体，三颗卫星是 AI 生成的文案以不同轨道绕行。非对称轨道椭圆传达诗性语言的不可预测性——六个文案不会均匀分布，它们遵循各自的引力轨迹向外辐射。"
            },
            {
                Component: PinholeFrame,
                title: "Pinhole Frame",
                subtitle: "REGISTRATION · PRECISION",
                philosophy: "四角的对位十字标记来自暗房工艺——摄影师用它们精确裁切画面。方形边框内是一个圆形取景器，底部两条线是将要写下的文案。手工摄影的触感与 AI 精度的对话。"
            },
            {
                Component: RadialBreath,
                title: "Radial Breath",
                subtitle: "EMANATION · SIX VOICES",
                philosophy: "从单一中心向外辐射的十二条射线——六长六短，呼应产品的「一图生六文」核心功能。实心中心是那张照片，每条长射线末端的圆点是一个独立的文案声部。同一来源，六种诠释。"
            },
            {
                Component: FoldedLight,
                title: "Folded Light",
                subtitle: "TRANSFORMATION · UNFOLDING",
                philosophy: "画布沿对角线一分为二：左上是照片（三角形内含取景圆），右下是文字（横向渐退的三条线）。折痕虚线是 AI 的工作界面，照片在这里「折叠打开」，成为语言流出的形态。"
            }
        ];

        const LogoShowcase = () => {
            const [selected, setSelected] = useState(null);
            return (
                <div className="min-h-screen flex flex-col items-center py-20 px-6">

                    {/* Header */}
                    <div className="text-center mb-24 max-w-3xl">
                        <div className="text-xs font-mono opacity-30 uppercase tracking-ultra-wide mb-6">
                            Logo Exploration — Phase 2
                        </div>
                        <h1 className="text-5xl md:text-6xl font-extralight tracking-widest mb-4"
                            style={{ fontFamily: 'Inter', letterSpacing: '0.25em' }}>
                            时间胶囊
                        </h1>
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide mt-4">
                            AI Visual Caption Generator
                        </p>
                        <div className="w-12 h-px bg-current mx-auto mt-8 opacity-20"></div>
                    </div>

                    {/* Logo Grid */}
                    <div className="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16 mb-32">
                        {logos.map((logo, index) => (
                            <div
                                key={index}
                                className="flex flex-col items-center logo-card cursor-pointer"
                                onClick={() => setSelected(selected === index ? null : index)}
                                style={{
                                    outline: selected === index
                                        ? '2px solid rgba(43,32,21,0.25)'
                                        : '2px solid transparent',
                                    borderRadius: '4px',
                                    padding: '24px 16px',
                                    transition: 'all 0.4s ease'
                                }}
                            >
                                {/* Selection badge */}
                                {selected === index && (
                                    <div className="font-mono text-xs mb-4 opacity-50 uppercase tracking-widest">
                                        ✦ selected
                                    </div>
                                )}

                                {/* Logo Canvas */}
                                <div className="w-56 h-56 mb-8 flex items-center justify-center relative">
                                    <div className="logo-aura" style={{ borderRadius: '0' }}></div>
                                    <div className="w-28 h-28 relative z-10 logo-canvas">
                                        <logo.Component />
                                    </div>
                                </div>

                                {/* Text */}
                                <div className="text-center w-full px-2">
                                    <h2 className="text-sm font-medium tracking-widest mb-1 uppercase opacity-80">
                                        {logo.title}
                                    </h2>
                                    <h3 className="text-xs font-mono opacity-35 tracking-ultra-wide mb-5">
                                        {logo.subtitle}
                                    </h3>
                                    <p className="text-xs leading-relaxed opacity-55 text-left font-light"
                                       style={{ lineHeight: 1.9, fontSize: '11.5px' }}>
                                        {logo.philosophy}
                                    </p>
                                </div>

                                <div className="divider-line mt-8"></div>
                            </div>
                        ))}
                    </div>

                    {/* Side-by-side comparison at small sizes */}
                    <div className="max-w-4xl w-full mb-24">
                        <div className="text-center mb-10">
                            <p className="font-mono text-xs opacity-30 uppercase tracking-ultra-wide">
                                Scalability Test — Favicon / Icon / Nav
                            </p>
                            <div className="w-8 h-px bg-current mx-auto mt-4 opacity-15"></div>
                        </div>
                        <div className="grid grid-cols-6 gap-8">
                            {logos.map((logo, i) => (
                                <div key={i} className="flex flex-col items-center gap-6">
                                    {/* 64px */}
                                    <div style={{ width: 64, height: 64 }}><logo.Component /></div>
                                    {/* 32px */}
                                    <div style={{ width: 32, height: 32, opacity: 0.8 }}><logo.Component /></div>
                                    {/* 16px */}
                                    <div style={{ width: 16, height: 16, opacity: 0.6 }}><logo.Component /></div>
                                    <p className="font-mono text-center opacity-30"
                                       style={{ fontSize: '9px', letterSpacing: '0.1em' }}>
                                        {i + 1}
                                    </p>
                                </div>
                            ))}
                        </div>
                        <div className="flex justify-center gap-6 mt-6">
                            {['64px', '32px', '16px'].map(s => (
                                <span key={s} className="font-mono opacity-25"
                                      style={{ fontSize: '9px', letterSpacing: '0.15em' }}>
                                    {s}
                                </span>
                            ))}
                        </div>
                    </div>

                    {/* Dark background test */}
                    <div className="max-w-4xl w-full rounded-sm mb-24 p-12"
                         style={{ background: '#2b2015' }}>
                        <p className="font-mono text-xs text-center mb-8 opacity-30 uppercase tracking-ultra-wide"
                           style={{ color: '#F9F7F4' }}>
                            Dark Background Rendering
                        </p>
                        <div className="flex justify-center gap-16 flex-wrap">
                            {logos.map((logo, i) => (
                                <div key={i} style={{ width: 48, height: 48, color: '#F9F7F4' }}>
                                    <logo.Component />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="mt-16 text-center">
                        <p className="font-mono text-xs opacity-25 uppercase tracking-ultra-wide leading-loose">
                            时间胶囊 · Logo Exploration<br/>
                            Click any variant to select · 2026
                        </p>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<LogoShowcase />, document.getElementById('root'));
    </script>
</body>
</html>
